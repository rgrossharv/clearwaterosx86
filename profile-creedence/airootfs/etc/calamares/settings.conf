---
modules-search: [ local, /usr/lib/calamares/modules ]

instances:
  - id: clearwater-cleanup
    module: shellprocess
    config: shellprocess-clearwater-cleanup.conf

sequence:
  - show:
      - welcome
      - locale
      - keyboard
      - partition
      - users
      - summary
  - exec:
      - partition
      - mount
      - unpackfs
      - machineid
      - fstab
      - locale
      - keyboard
      - localecfg
      - users
      - displaymanager
      - networkcfg
      - hwclock
      - services-systemd
      - clearwater-cleanup
      - bootloader
      - umount
  - show:
      - finished

branding: clearwateros
prompt-install: false
dont-chroot: false
oem-setup: false
