---
dontChroot: false
timeout: 120
script:
  - "rm -f /etc/sddm.conf.d/10-clearwater-live.conf"
  - "rm -f /etc/sudoers.d/10-clearwater-live"
  - "rm -f /etc/sysusers.d/clearwater.conf"
  - "rm -f /etc/tmpfiles.d/clearwater.conf"
  - "rm -f /etc/polkit-1/rules.d/49-clearwater-calamares.rules"
  - "rm -f /usr/local/bin/install-clearwateros"
  - "rm -f /usr/share/applications/calamares.desktop"
  - "rm -f /etc/skel/Desktop/calamares.desktop"
  - "find /home -mindepth 3 -maxdepth 3 -path '*/Desktop/calamares.desktop' -delete 2>/dev/null || true"
  - "rm -f /etc/pacman.d/hooks/uncomment-mirrors.hook"
  - "rm -f /etc/pacman.d/hooks/zzzz99-remove-custom-hooks-from-airootfs.hook"
  - "if id clearwater >/dev/null 2>&1; then userdel -r clearwater || userdel clearwater || true; fi"
  - "pacman -Rns --noconfirm calamares || true"
  - "sed -i '/^\\[clearwater-local\\]/,+2d' /etc/pacman.conf"
  - "systemctl set-default graphical.target"
  - "systemctl enable NetworkManager.service"
  - "systemctl enable bluetooth.service"
  - "systemctl enable sddm.service"
  - "systemctl enable systemd-resolved.service"
  - "systemctl enable systemd-timesyncd.service"
  - "mkinitcpio -P"
