---
defaultGroups:
  - name: users
    must_exist: true
    system: true
  - audio
  - input
  - lp
  - network
  - optical
  - storage
  - video
  - name: wheel
    must_exist: false
    system: true
sudoersGroup: wheel
sudoersConfigureWithGroup: true
setRootPassword: false
doReusePassword: false
displayAutologin: true
doAutologin: false
passwordRequirements:
  minLength: 1
  maxLength: -1
allowWeakPasswords: true
allowWeakPasswordsDefault: true
user:
  shell: /bin/bash
  forbidden_names: [ root, nobody, clearwater ]
  home_permissions: "o700"
hostname:
  location: EtcFile
  writeHostsFile: true
  template: "clearwater"
  forbidden_names: [ localhost ]
